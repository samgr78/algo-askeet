name: Deploy algo to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ghcr.io/${{ github.repository }}:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

      - name: Deploy on VPS via SSH
        env:
          KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${KEY_B64:-}" ]; then
            echo "::error::Secret VPS_SSH_KEY_B64 is empty. Set it (Settings > Secrets and variables > Actions) to the single-line base64 of the private key."
            exit 1
          fi

          install -d -m 700 ~/.ssh
          echo "$KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Validate the decoded key before using it (clear error if mangled)
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "::error::Decoded key is not a valid private key. Re-create VPS_SSH_KEY_B64 from: base64 -w0 <keyfile>"
            exit 1
          fi

          PORT="${VPS_PORT:-22}"
          SSH="ssh -i $HOME/.ssh/deploy_key -p $PORT \
            -o IdentitiesOnly=yes -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15"

          # GHCR_TOKEN is the ephemeral GITHUB_TOKEN (valid only during this run);
          # used on the VPS to pull the private package, then logged out.
          $SSH "${VPS_USER}@${VPS_HOST}" \
            IMAGE="$IMAGE" GHCR_USER="$GHCR_USER" GHCR_TOKEN="$GHCR_TOKEN" bash -s <<'EOSSH'
          set -e
          docker network create askeet-net 2>/dev/null || true
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker pull "$IMAGE"
          docker stop algo-askeet || true
          docker rm algo-askeet || true
          docker run -d \
            --name algo-askeet \
            --restart always \
            --network askeet-net \
            -p 8000:8000 \
            --env-file /var/www/algo/.env \
            "$IMAGE"
          docker logout ghcr.io || true
          echo "Deploiement algo termine ! ($(docker inspect algo-askeet --format '{{.State.Status}}'))"
          EOSSH

          rm -f ~/.ssh/deploy_key
