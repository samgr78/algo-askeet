services:
  algo:
    image: nasurall/askeet-algo:latest
    container_name: algo-askeet
    restart: always
    # DB creds + API_SECRET_KEY provided by the server-side .env (NOT in git)
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
